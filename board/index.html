<!--
  agile-board viewer — adapted from ioniks/MarkdownTaskManager (MPL-2.0).
  This file is a Modification of the upstream src/index.html: build:css/build:js
  placeholders were replaced with direct <link>/<script> tags (no build step),
  the welcome/header copy was translated to English, and — since this fork is
  web-only, with no local-folder mode — the columnsModal markup and the local
  file/multi-project scripts (03-storage.js, 04-io.js, 10-archive.js,
  11-generate.js) were removed. scripts/20-remote.js, scripts/21-write.js, and
  scripts/22-assistant.js are new, original code (MIT). See ../NOTICE.
  22-assistant.js adds its own header button (#assistantToggleBtn) and a
  floating panel (#assistantPanel), both created dynamically in JS rather
  than hardcoded here, since they're hidden by default and only ever shown
  once logged in (same gating as write-mode's drag/edit affordances).

  A handful of header buttons (selectFolderBtn, newTaskBtn, archiveBtn,
  manageColsBtn, projectSelector, renameProjectBtn, deleteProjectBtn) and the
  archiveModal are kept even though they're permanently inert/hidden: several
  kept upstream files (02-i18n.js's updateStaticTexts(), 09-task-detail.js's
  showTaskDetail()) reference these element ids unconditionally, with no
  existence check, so removing the elements would throw at runtime. Leaving
  them in the DOM (never shown, never wired to anything reachable) is the
  smallest safe fix — see NOTICE for the one guarded exception this required
  in 02-i18n.js itself.
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agile Board</title>
    <link rel="stylesheet" href="styles/00-variables.css">
    <link rel="stylesheet" href="styles/01-base.css">
    <link rel="stylesheet" href="styles/02-board.css">
    <link rel="stylesheet" href="styles/03-modals.css">
    <link rel="stylesheet" href="styles/04-components.css">
    <link rel="stylesheet" href="styles/05-theme-responsive.css">
</head>
<body>
    <header class="header">
        <div class="header-content">
            <h1 id="headerTitle">📋 Agile Board</h1>
            <div style="display: flex; gap: 0.75rem; align-items: center;">
                <select id="languageSelector" onchange="setLanguage(this.value)" style="padding: 0.6rem 1rem; border: 1px solid var(--border-color); border-radius: 6px; font-size: 0.9rem; background: white; cursor: pointer;">
                    <option value="en">English</option>
                    <option value="fr">Français</option>
                    <option value="de">Deutsch</option>
                    <option value="zh_cn">简体中文</option>
                </select>
                <button id="giteaAuthBtn" class="btn btn-secondary">🔑 Log in with Gitea</button>
                <select id="projectSelector" style="display: none; padding: 0.6rem 1rem; border: 1px solid var(--border-color); border-radius: 6px; font-size: 0.9rem; background: white; cursor: pointer; min-width: 180px;">
                </select>
                <button id="renameProjectBtn" class="btn btn-secondary" style="display: none; padding: 0.6rem;" title="Rename project" onclick="renameCurrentProject()">✏️</button>
                <button id="deleteProjectBtn" class="btn btn-secondary" style="display: none; padding: 0.6rem;" title="Delete project" onclick="deleteCurrentProject()">🗑️</button>
                <button id="selectFolderBtn" class="btn btn-primary">📁 Folder</button>
                <button id="newTaskBtn" class="btn btn-secondary" style="display: none;">➕ Task</button>
                <button id="archiveBtn" class="btn btn-secondary" style="display: none;">📦 Archive</button>
                <button id="manageColsBtn" class="btn btn-secondary" style="display: none;">⚙️ Columns</button>
                <button class="theme-toggle" onclick="toggleTheme()" title="Toggle dark mode" id="themeToggleBtn">🌙</button>
            </div>
        </div>
    </header>
    <div id="filterBar" style="display: none; background: white; border-bottom: 1px solid var(--border); padding: 1rem 0;">
        <div style="max-width: 1200px; margin: 0 auto; padding: 0 2rem;">
            <!-- Global Search -->
            <div style="display: flex; justify-content: center; margin-bottom: 1rem;">
                <div style="position: relative; max-width: 600px; width: 100%;">
                    <input
                        type="text"
                        id="globalSearchInput"
                        placeholder="Search tasks..."
                        style="width: 100%; padding: 0.75rem 3rem 0.75rem 1rem; border: 2px solid #cbd5e0; border-radius: 8px; font-size: 1rem; transition: border-color 0.2s;"
                        oninput="applyGlobalSearch()"
                    >
                    <button
                        id="clearGlobalSearch"
                        onclick="clearGlobalSearch()"
                        style="position: absolute; right: 0.5rem; top: 50%; transform: translateY(-50%); background: none; border: none; color: #718096; cursor: pointer; font-size: 1.2rem; padding: 0.5rem; display: none;"
                        title="Clear search"
                    >✕</button>
                </div>
            </div>
            <div style="display: flex; gap: 1rem; align-items: center; flex-wrap: wrap; margin-bottom: 0.75rem; justify-content: center;">
                <div style="display: flex; gap: 0.5rem; align-items: center;">
                    <label style="font-weight: 500; font-size: 0.9rem;">Tags:</label>
                    <select id="filterTagSelect" style="padding: 0.5rem; border: 1px solid #cbd5e0; border-radius: 4px; min-width: 150px;">
                        <option value="">Select...</option>
                    </select>
                    <button onclick="addFilter('tag')" class="btn btn-primary" style="padding: 0.5rem 0.75rem; font-size: 0.85rem;">+</button>
                </div>
                <div style="display: flex; gap: 0.5rem; align-items: center;">
                    <label style="font-weight: 500; font-size: 0.9rem;">Category:</label>
                    <select id="filterCategorySelect" style="padding: 0.5rem; border: 1px solid #cbd5e0; border-radius: 4px; min-width: 150px;">
                        <option value="">Select...</option>
                    </select>
                    <button onclick="addFilter('category')" class="btn btn-primary" style="padding: 0.5rem 0.75rem; font-size: 0.85rem;">+</button>
                </div>
                <div style="display: flex; gap: 0.5rem; align-items: center;">
                    <label style="font-weight: 500; font-size: 0.9rem;">User:</label>
                    <select id="filterUserSelect" style="padding: 0.5rem; border: 1px solid #cbd5e0; border-radius: 4px; min-width: 150px;">
                        <option value="">Select...</option>
                    </select>
                    <button onclick="addFilter('user')" class="btn btn-primary" style="padding: 0.5rem 0.75rem; font-size: 0.85rem;">+</button>
                </div>
                <div style="display: flex; gap: 0.5rem; align-items: center;">
                    <label style="font-weight: 500; font-size: 0.9rem;">Priority:</label>
                    <select id="filterPrioritySelect" style="padding: 0.5rem; border: 1px solid #cbd5e0; border-radius: 4px; min-width: 150px;">
                        <option value="">Select...</option>
                    </select>
                    <button onclick="addFilter('priority')" class="btn btn-primary" style="padding: 0.5rem 0.75rem; font-size: 0.85rem;">+</button>
                </div>
                <button onclick="clearFilters()" class="btn btn-secondary" style="padding: 0.5rem 1rem;">✕ Clear all</button>
            </div>
            <div id="activeFilters" style="display: flex; gap: 0.5rem; flex-wrap: wrap; min-height: 32px; justify-content: center;"></div>
        </div>
    </div>

    <div class="container">
        <div id="welcomeScreen" class="welcome">
            <h2>Loading the board... 👋</h2>
            <p>If this message doesn't go away, the board data couldn't be reached —
               check your connection and reload.</p>
        </div>
    </div>

    <div id="kanbanView" style="display: none;">
        <div id="debugInfo" class="debug-info" style="display: none;"></div>
        <div class="kanban-board" id="kanbanBoard"></div>
    </div>

    <!-- Modal Task Detail -->
    <div id="taskModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Task details</h2>
                <button class="close-btn" onclick="closeModal()">&times;</button>
            </div>
            <div id="modalBody" class="task-detail"></div>
            <div id="taskModalActions" class="actions"></div>
        </div>
    </div>

    <!-- Modal New/Edit Task — despite the name, this is also the edit-task
         modal a logged-in user gets from the task detail view's Edit button
         (see openTaskModal() in 07-columns-form.js and 21-write.js). The
         "new task" creation path itself is unreachable in this fork: the
         controls that would open it (newTaskBtn, the per-column "+" button)
         are always hidden/removed — see NOTICE. -->
    <div id="newTaskModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>New task</h2>
                <button class="close-btn" onclick="closeTaskModal()">&times;</button>
            </div>
            <form id="newTaskForm" style="padding: 1.5rem; background: #f8f9fa;">
                <input type="hidden" id="taskEditId">
                <div style="margin-bottom: 1rem;">
                    <label for="taskTitle" style="display: block; margin-bottom: 0.5rem; font-weight: 600; color: #333;">Title *</label>
                    <input type="text" id="taskTitle" required style="width: 100%; padding: 0.75rem; border: 2px solid #cbd5e0; border-radius: 6px; font-size: 0.95rem; background: white; box-sizing: border-box;">
                </div>
                <div style="margin-bottom: 1rem;">
                    <label for="taskStatus" style="display: block; margin-bottom: 0.5rem; font-weight: 600; color: #333;">Column *</label>
                    <select id="taskStatus" required style="width: 100%; padding: 0.75rem; border: 2px solid #cbd5e0; border-radius: 6px; font-size: 0.95rem; background: white; box-sizing: border-box;">
                    </select>
                </div>
                <div class="modal-form-grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem;">
                    <div>
                        <label for="taskPriority" style="display: block; margin-bottom: 0.5rem; font-weight: 600; color: #333;">Priority</label>
                        <select id="taskPriority" style="width: 100%; padding: 0.75rem; border: 2px solid #cbd5e0; border-radius: 6px; font-size: 0.95rem; background: white; box-sizing: border-box;">
                            <option value="">None</option>
                            <option value="Critical">🔴 Critical</option>
                            <option value="High">🟠 High</option>
                            <option value="Medium">🟡 Medium</option>
                            <option value="Low">🟢 Low</option>
                        </select>
                    </div>
                    <div>
                        <label for="taskCategory" style="display: block; margin-bottom: 0.5rem; font-weight: 600; color: #333;">Category</label>
                        <input type="text" id="taskCategory" list="categoriesList" placeholder="Frontend, Backend..." style="width: 100%; padding: 0.75rem; border: 2px solid #cbd5e0; border-radius: 6px; font-size: 0.95rem; background: white; box-sizing: border-box;">
                    </div>
                </div>
                <div style="margin-bottom: 1rem;">
                    <label for="taskAssignee" style="display: block; margin-bottom: 0.5rem; font-weight: 600; color: #333;">Assigned to</label>
                    <input type="text" id="taskAssignee" list="usersList" placeholder="@alice" style="width: 100%; padding: 0.75rem; border: 2px solid #cbd5e0; border-radius: 6px; font-size: 0.95rem; background: white; box-sizing: border-box;">
                </div>
                <div class="modal-form-grid" style="display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 1rem; margin-bottom: 1rem;">
                    <div>
                        <label for="taskCreated" style="display: block; margin-bottom: 0.5rem; font-weight: 600; color: #333;">Created</label>
                        <input type="date" id="taskCreated" style="width: 100%; padding: 0.75rem; border: 2px solid #cbd5e0; border-radius: 6px; font-size: 0.95rem; background: white; box-sizing: border-box;">
                    </div>
                    <div>
                        <label for="taskStarted" style="display: block; margin-bottom: 0.5rem; font-weight: 600; color: #333;">Started</label>
                        <input type="date" id="taskStarted" style="width: 100%; padding: 0.75rem; border: 2px solid #cbd5e0; border-radius: 6px; font-size: 0.95rem; background: white; box-sizing: border-box;">
                    </div>
                    <div>
                        <label for="taskDue" style="display: block; margin-bottom: 0.5rem; font-weight: 600; color: #333;">Due</label>
                        <input type="date" id="taskDue" style="width: 100%; padding: 0.75rem; border: 2px solid #cbd5e0; border-radius: 6px; font-size: 0.95rem; background: white; box-sizing: border-box;">
                    </div>
                    <div>
                        <label for="taskCompleted" style="display: block; margin-bottom: 0.5rem; font-weight: 600; color: #333;">Finished</label>
                        <input type="date" id="taskCompleted" style="width: 100%; padding: 0.75rem; border: 2px solid #cbd5e0; border-radius: 6px; font-size: 0.95rem; background: white; box-sizing: border-box;">
                    </div>
                </div>
                <div style="margin-bottom: 1rem;">
                    <label for="taskTags" style="display: block; margin-bottom: 0.5rem; font-weight: 600; color: #333;">Tags</label>
                    <input type="text" id="taskTags" list="tagsList" placeholder="#bug #feature" style="width: 100%; padding: 0.75rem; border: 2px solid #cbd5e0; border-radius: 6px; font-size: 0.95rem; background: white; box-sizing: border-box;">
                    <small style="color: var(--text-secondary); font-size: 0.85rem;">Separate with spaces</small>
                </div>
                <div style="margin-bottom: 1rem;">
                    <label for="taskDescription" style="display: block; margin-bottom: 0.5rem; font-weight: 600; color: #333;">Description</label>
                    <textarea id="taskDescription" rows="4" style="width: 100%; padding: 0.75rem; border: 2px solid #cbd5e0; border-radius: 6px; font-size: 0.95rem; resize: vertical; background: white; box-sizing: border-box;"></textarea>
                </div>
                <div style="margin-bottom: 1.5rem;">
                    <label style="display: block; margin-bottom: 0.5rem; font-weight: 600; color: var(--text);">Subtasks</label>
                    <ul id="formSubtasksList" style="list-style: none; padding: 0; margin: 0 0 0.5rem 0; max-height: 150px; overflow-y: auto;"></ul>
                    <div style="display: flex; gap: 0.5rem;">
                        <input type="text" id="formSubtaskInput" placeholder="Add a subtask..." style="flex: 1; padding: 0.5rem; border: 2px solid var(--border, #cbd5e0); border-radius: 4px; font-size: 0.9rem; background: var(--bg); color: var(--text);">
                        <button type="button" onclick="addFormSubtask()" class="btn btn-secondary" style="padding: 0.5rem 1rem;">+ Add</button>
                    </div>
                </div>
                <div style="margin-bottom: 1.5rem;">
                    <label for="taskNotes" style="display: block; margin-bottom: 0.5rem; font-weight: 600; color: #333;">Notes</label>
                    <textarea id="taskNotes" rows="6" placeholder="Technical notes, results, decisions, etc.&#10;&#10;Markdown supported:&#10;**bold**, *italic*, `code`, lists, links..." style="width: 100%; padding: 0.75rem; border: 2px solid #cbd5e0; border-radius: 6px; font-size: 0.95rem; resize: vertical; background: white; box-sizing: border-box; font-family: monospace;"></textarea>
                    <small style="color: var(--text-secondary); font-size: 0.85rem;">Markdown supported: **bold**, *italic*, `code`, lists, links, **Subsections**:</small>
                </div>
                <div class="actions">
                    <button type="button" class="btn btn-secondary" onclick="closeTaskModal()">Cancel</button>
                    <button type="submit" class="btn btn-primary" id="taskFormSubmitBtn">Create</button>
                </div>
            </form>
            <!-- Datalists for autocomplete -->
            <datalist id="categoriesList"></datalist>
            <datalist id="usersList"></datalist>
            <datalist id="tagsList"></datalist>
        </div>
    </div>

    <!-- Modal Archives — kept only because 09-task-detail.js's
         showTaskDetail() (used by every card click) reads #archiveModal
         unconditionally, with no existence check; it's otherwise fully
         inert — nothing ever makes it active. See the top-of-file note. -->
    <div id="archiveModal" class="modal">
        <div class="modal-content" style="max-width: 900px;">
            <div class="modal-header">
                <h2 id="archiveModalTitle">📦 Archive</h2>
                <button class="close-btn" onclick="closeArchiveModal()">&times;</button>
            </div>
            <div style="padding: 1.5rem;">
                <div style="margin-bottom: 1rem;">
                    <input type="text" id="archiveSearch" placeholder="Search the archive..." style="width: 100%; padding: 0.75rem; border: 2px solid var(--border, #cbd5e0); border-radius: 6px; font-size: 0.95rem; background: var(--bg); color: var(--text);">
                </div>
                <div id="archiveList" style="max-height: 500px; overflow-y: auto;"></div>
            </div>
        </div>
    </div>

    <!-- Notification -->
    <div id="notification" class="notification">
        <span id="notificationText"></span>
    </div>

    <script src="scripts/00-theme.js"></script>
    <script src="scripts/01-state.js"></script>
    <script src="scripts/02-i18n.js"></script>
    <script src="scripts/05-markdown.js"></script>
    <script src="scripts/06-filters.js"></script>
    <script src="scripts/07-columns-form.js"></script>
    <script src="scripts/08-board.js"></script>
    <script src="scripts/09-task-detail.js"></script>
    <script src="scripts/12-init.js"></script>
    <script src="scripts/20-remote.js"></script>
    <script src="scripts/21-write.js"></script>
    <script src="scripts/22-assistant.js"></script>
</body>
</html>
